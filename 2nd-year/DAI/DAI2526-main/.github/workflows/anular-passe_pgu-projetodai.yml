# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
name: Build and deploy JAR app to Azure Web App - pgu-projetodai
on:
  push:
    branches:
      - anular-passe
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java version
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'
      - name: Build with Maven
        run: |
          cd backend
          mvn clean install -DskipTests
      - name: Rename JAR
        run: mv backend/target/loginapi-0.0.1-SNAPSHOT.jar backend/target/app.jar
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: '${{ github.workspace }}/backend/target/app.jar'
          retention-days: 1
  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: java-app
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F2BD108AD32143019FE3DA6170A76690 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_0B700EFF3EA04D4ABEAC2BEE3274C694 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_3BD0E024B18B40418720441A4E483976 }}
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'pgu-projetodai'
          slot-name: 'Production'
          package: '*.jar'
