<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TUB – Perfil do Motorista</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#0f8bb5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="TUB">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="subpage.css">
    <style>
        .pm-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 480px;
            margin: 0 auto;
            padding: 24px 20px 2rem;
        }
        .pm-card {
            background: rgba(255,255,255,0.72);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.55);
            border-radius: 20px;
            padding: 28px 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .pm-avatar {
            width: 64px; height: 64px;
            border-radius: 50%;
            background: rgba(0,162,232,0.1);
            border: 2px solid var(--tub-blue);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 14px;
        }
        .pm-name {
            text-align: center;
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-dark, #1a1a2e);
            margin-bottom: 8px;
        }
        .pm-badge {
            display: block;
            text-align: center;
            margin-bottom: 24px;
        }
        .pm-badge span {
            display: inline-block;
            padding: 3px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            background: rgba(0,162,232,0.12);
            color: var(--tub-nav, #005f8e);
        }
        .pm-info-row {
            display: flex;
            flex-direction: column;
            gap: 3px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .pm-info-row:last-child { border-bottom: none; }
        .pm-info-label {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #9ca3af;
        }
        .pm-info-value {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-dark, #1a1a2e);
        }
        .pm-logout-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 14px;
            background: rgba(230,0,0,0.08);
            border: 1px solid rgba(230,0,0,0.18);
            color: #c00;
            font-size: 0.95rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s, color 0.2s;
        }
        .pm-logout-btn:hover { background: #e60000; color: #fff; }
    </style>
</head>
<body>
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>

    <header class="sp-header">
        <a href="verificar_qr.html" class="sp-back-btn" aria-label="Voltar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </a>
        <h1 class="sp-page-title">Perfil</h1>
        <div class="sp-header-right"></div>
    </header>

    <div class="pm-wrapper">

        <div class="pm-card" id="main-content" style="display:none;">
            <div class="pm-avatar">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--tub-blue,#00a2e8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </div>
            <p class="pm-name" id="pm-nome">—</p>
            <div class="pm-badge"><span>MOTORISTA</span></div>
            <div class="pm-info-row">
                <span class="pm-info-label">Conta</span>
                <span class="pm-info-value" id="pm-conta">—</span>
            </div>
            <div class="pm-info-row">
                <span class="pm-info-label">Palavra-Passe</span>
                <span class="pm-info-value">••••••••</span>
            </div>
        </div>

        <div id="auth-required" style="display:none;text-align:center;padding:40px 20px;">
            <p style="color:#1a1a2e;font-weight:700;margin-bottom:8px;">Sessão não iniciada</p>
            <a href="index.html" style="color:var(--tub-blue,#00a2e8);font-size:0.9rem;">Iniciar sessão</a>
        </div>

        <button class="pm-logout-btn" id="btn-logout" onclick="logout()" style="display:none;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
            Terminar Sessão
        </button>

    </div>

    <script>
        const API = '';

        function logout() {
            fetch(`${API}/api/logout`, { method: 'POST', credentials: 'include' }).catch(() => {});
            ['nomeCompleto', 'perfil', 'role', 'idCliente', 'estatuto', 'estatutoAutomatico',
             'dataNascimento', 'morada', 'nif', 'telefone', 'cc'].forEach(k => localStorage.removeItem(k));
            window.location.href = 'index.html';
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const nomeCompleto = localStorage.getItem('nomeCompleto');
            if (!nomeCompleto) {
                document.getElementById('auth-required').style.display = '';
                return;
            }

            // Guard: only MOTORISTA should reach this page
            if (localStorage.getItem('role') !== 'MOTORISTA') {
                window.location.replace('index.html');
                return;
            }

            try {
                const res = await fetch(`${API}/api/me`, { credentials: 'include' });
                if (res.status === 401 || res.status === 403) {
                    ['nomeCompleto', 'perfil', 'role', 'idCliente', 'estatuto', 'estatutoAutomatico',
                     'dataNascimento', 'morada', 'nif', 'telefone', 'cc'].forEach(k => localStorage.removeItem(k));
                    window.location.replace('index.html');
                    return;
                }
                if (res.ok) {
                    const data = await res.json();
                    // For MOTORISTA, /api/me returns the email in nomeCompleto (authentication.getName())
                    const conta = data.nomeCompleto || nomeCompleto;
                    document.getElementById('pm-nome').textContent  = conta;
                    document.getElementById('pm-conta').textContent = conta;
                }
            } catch (e) {
                // Server unreachable — show cached value; session validated on next API call
                document.getElementById('pm-nome').textContent  = nomeCompleto;
                document.getElementById('pm-conta').textContent = nomeCompleto;
            }

            document.getElementById('main-content').style.display = '';
            document.getElementById('btn-logout').style.display = '';
        });
    </script>
</body>
</html>
