<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TUB – Notificações</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#0f8bb5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="TUB">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="subpage.css">
    <style>
        .sp-header-icon-btn {
            width: 38px; height: 38px; border-radius: 12px;
            background: rgba(255,255,255,0.18); color: #fff; border: none;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: background 0.18s; padding: 0; margin: 0;
        }
        .sp-header-icon-btn:hover { background: rgba(255,255,255,0.28); }
        .notif-list { display: flex; flex-direction: column; gap: 10px; }
        .notif-card {
            background: rgba(255,255,255,0.88);
            border-radius: 18px; padding: 16px 18px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.07);
            display: flex; gap: 14px; align-items: flex-start;
            transition: opacity 0.3s;
            border-left: 4px solid transparent;
        }
        .notif-card--nao-lida { border-left-color: var(--tub-blue); }
        .notif-card--lida { opacity: 0.65; }
        .notif-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .notif-icon--INFO    { background: rgba(0,162,232,0.12); color: #0077b6; }
        .notif-icon--SUCESSO { background: rgba(52,199,89,0.12); color: #1a8a3a; }
        .notif-icon--AVISO   { background: rgba(255,149,0,0.12); color: #e06000; }
        .notif-icon--ERRO    { background: rgba(255,59,48,0.12); color: #c0392b; }
        .notif-body { flex: 1; }
        .notif-card-title { font-size: 0.92rem; font-weight: 700; color: #1a1a2e; }
        .notif-card-msg   { font-size: 0.82rem; color: #555; margin-top: 3px; line-height: 1.4; }
        .notif-card-meta  { font-size: 0.72rem; color: #aaa; margin-top: 6px; }
        .btn-mark-read {
            background: rgba(0,119,182,0.08); color: var(--tub-nav); border: none;
            border-radius: 8px; padding: 5px 10px; font-size: 0.72rem; font-weight: 600;
            cursor: pointer; width: auto; margin: 6px 0 0 0; transition: all 0.2s;
        }
        .btn-mark-read:hover { background: var(--tub-nav); color: #fff; }
        .empty-state-notif { text-align: center; padding: 48px 20px; color: #94a3b8; }
        .empty-state-notif svg { margin-bottom: 12px; opacity: 0.4; display: block; margin-left: auto; margin-right: auto; }
        .empty-state-notif p { font-size: 1rem; }
        .msg-sucesso {
            background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.2);
            color: #16a34a; border-radius: 10px; padding: 10px 14px;
            font-size: 0.88rem; display: none;
        }
    </style>
</head>
<body>
<script src="session-guard.js"></script>
<div class="bg-shape shape1"></div>
<div class="bg-shape shape2"></div>

<header class="sp-header">
    <a href="index.html" class="sp-back-btn" aria-label="Início">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
    </a>
    <h1 class="sp-page-title">Notificações</h1>
    <button class="sp-header-icon-btn" onclick="marcarTodasLidas()" title="Marcar todas como lidas">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
    </button>
</header>

<main class="kf-main" style="padding-bottom:40px;">
    <div class="msg-sucesso" id="msg-sucesso"></div>

    <div id="notif-loading" style="text-align:center;color:#94a3b8;padding:40px 0;">
        A carregar…
    </div>
    <div id="notif-empty" class="empty-state-notif hidden">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </svg>
        <p>Sem notificações.</p>
    </div>
    <div class="notif-list" id="notif-list"></div>
</main>

<!-- Bottom nav -->
<nav class="kf-bottom-nav" aria-label="Navegação principal">
    <a href="index.html" class="kf-nav-item" id="nav-inicio">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        <span>Início</span>
    </a>
    <a href="carteira.html" class="kf-nav-item" id="nav-carteira">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="5" width="20" height="14" rx="2"/>
            <path d="M16 12h4v4h-4a2 2 0 0 1 0-4z"/>
        </svg>
        <span>Carteira</span>
    </a>
    <a href="pagamentos.html" class="kf-nav-item" id="nav-pagamentos">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
            <line x1="1" y1="10" x2="23" y2="10"></line>
        </svg>
        <span>Pagamentos</span>
    </a>
    <a href="perfil.html" class="kf-nav-item" id="nav-perfil">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
        </svg>
        <span>Perfil</span>
    </a>
</nav>

<script>
    const API = '';

    if (!localStorage.getItem('nomeCompleto')) {
        window.location.href = 'index.html';
    }

    function mostrarFeedback(msg) {
        const el = document.getElementById('msg-sucesso');
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(() => { el.style.display = 'none'; }, 3000);
    }

    async function carregarNotificacoes() {
        try {
            const res = await fetch(`${API}/api/user/notificacoes`, { credentials: 'include' });
            if (!res.ok) throw new Error();
            const lista = await res.json();

            document.getElementById('notif-loading').classList.add('hidden');

            if (!lista.length) {
                document.getElementById('notif-empty').classList.remove('hidden');
                return;
            }
            document.getElementById('notif-list').innerHTML = lista.map(n => {
                const icone = tipoIcone(n.tipo);
                return `
                <div class="notif-card ${n.lida ? 'notif-card--lida' : 'notif-card--nao-lida'}" id="notif-${n.id}">
                    <div class="notif-icon notif-icon--${n.tipo}">${icone}</div>
                    <div class="notif-body">
                        <div class="notif-card-title">${escHtml(n.titulo)}</div>
                        <div class="notif-card-msg">${escHtml(n.mensagem)}</div>
                        <div class="notif-card-meta">${formatDate(n.dataCriacao)}
                            ${n.lida ? ' · <span style="color:#34c759;font-weight:600;">Lida</span>' : ''}
                        </div>
                        ${!n.lida ? `<button class="btn-mark-read" onclick="marcarLida(${n.id})">Marcar como lida</button>` : ''}
                    </div>
                </div>`;
            }).join('');
        } catch(e) {
            document.getElementById('notif-loading').textContent = 'Erro ao carregar notificações.';
        }
    }

    function tipoIcone(tipo) {
        const icons = {
            INFO: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>',
            SUCESSO: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>',
            AVISO: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>',
            ERRO: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>',
        };
        return icons[tipo] || icons['INFO'];
    }

    async function marcarLida(id) {
        try {
            await fetch(`${API}/api/user/notificacoes/${id}/lida`, { method: 'PATCH', credentials: 'include' });
            await carregarNotificacoes();
        } catch(e) {}
    }

    async function marcarTodasLidas() {
        try {
            await fetch(`${API}/api/user/notificacoes/todas-lidas`, { method: 'PATCH', credentials: 'include' });
            await carregarNotificacoes();
            mostrarFeedback('Notificações marcadas como lidas.');
        } catch(e) {}
    }

    function escHtml(s) { if (!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function formatDate(iso) { if (!iso) return ''; const d = new Date(iso); return isNaN(d) ? iso : d.toLocaleString('pt-PT'); }

    document.addEventListener('DOMContentLoaded', carregarNotificacoes);
</script>
</body>
</html>
