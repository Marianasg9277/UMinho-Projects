<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUB – Fiscalização</title>
    <meta name="description" content="TUB Fiscalização – Consulta de validações registadas.">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#0f8bb5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="TUB">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* ── Layout ── */
        .fisc-main { max-width: 1200px; margin: 0 auto; padding: 28px 28px 80px; }

        /* ── Header ── */
        .admin-header {
            margin-bottom: 20px;
            display: flex; align-items: flex-end; justify-content: space-between;
            flex-wrap: wrap; gap: 12px;
            padding: 20px 24px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.22);
            border-radius: 20px;
        }
        .admin-title {
            font-size: 1.7rem; font-weight: 800; color: #fff;
            letter-spacing: -0.03em; display: flex; align-items: center; gap: 10px;
        }
        .admin-title-icon {
            width: 36px; height: 36px; background: rgba(255,255,255,0.2);
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
        }
        .admin-sub {
            font-size: 0.82rem; color: rgba(255,255,255,0.65);
            margin-top: 5px; display: flex; align-items: center; gap: 10px;
        }
        .admin-sub-pill {
            background: rgba(255,255,255,0.15); border-radius: 20px;
            padding: 3px 10px; font-size: 0.76rem; font-weight: 600; color: rgba(255,255,255,0.9);
        }
        .admin-header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .admin-user-chip {
            display: flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,0.15); border-radius: 30px;
            padding: 7px 14px 7px 8px; border: 1px solid rgba(255,255,255,0.2);
        }
        .admin-user-avatar {
            width: 28px; height: 28px; background: rgba(255,255,255,0.3);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 0.78rem; font-weight: 700; color: #fff;
        }
        .admin-user-name { font-size: 0.82rem; font-weight: 600; color: #fff; }
        .btn-logout {
            display: flex; align-items: center; gap: 6px;
            background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px; padding: 8px 14px; color: rgba(255,255,255,0.85);
            font-size: 0.82rem; font-weight: 600; font-family: 'Inter', sans-serif;
            cursor: pointer; transition: background 0.18s;
        }
        .btn-logout:hover { background: rgba(255,255,255,0.22); color: #fff; }

        /* ── Stat cards ── */
        .stats-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
            margin-bottom: 20px;
        }
        @media(max-width: 780px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
        .stat-card {
            background: rgba(255,255,255,0.94); border-radius: 18px;
            padding: 20px 18px 14px; text-align: center;
            box-shadow: 0 2px 16px rgba(0,0,0,0.07), 0 1px 3px rgba(0,0,0,0.04);
            border: 1px solid rgba(255,255,255,0.7); border-top: 3px solid transparent;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .stat-card:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(0,0,0,0.12); }
        .stat-card-1 { border-top-color: #0077b6; }
        .stat-card-2 { border-top-color: #7c3aed; }
        .stat-card-3 { border-top-color: #0891b2; }
        .stat-card-4 { border-top-color: #ef4444; }
        .stat-icon {
            width: 40px; height: 40px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; margin: 0 auto 10px;
        }
        .stat-icon-1 { background: rgba(0,119,182,0.1); color: #0077b6; }
        .stat-icon-2 { background: rgba(124,58,237,0.1); color: #7c3aed; }
        .stat-icon-3 { background: rgba(8,145,178,0.1); color: #0891b2; }
        .stat-icon-4 { background: rgba(239,68,68,0.1); color: #ef4444; }
        .stat-number { font-size: 2rem; font-weight: 800; color: #1a1a2e; line-height: 1; }
        .stat-label { font-size: 0.68rem; color: #9ca3af; margin-top: 6px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; }

        /* ── Section ── */
        .admin-section {
            background: rgba(255,255,255,0.95); border-radius: 22px;
            padding: 24px 26px; margin-bottom: 20px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.04);
            border: 1px solid rgba(255,255,255,0.7);
        }
        .section-title-row {
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 10px;
            padding-bottom: 16px; margin-bottom: 16px;
            border-bottom: 1.5px solid rgba(0,119,182,0.07);
        }
        .section-title {
            font-size: 0.95rem; font-weight: 700; color: #1a1a2e;
            display: flex; align-items: center; gap: 9px;
        }
        .section-title-icon {
            width: 30px; height: 30px; background: rgba(0,119,182,0.08);
            border-radius: 9px; display: flex; align-items: center; justify-content: center;
        }
        .btn-refresh {
            display: flex; align-items: center; gap: 6px;
            background: transparent; border: 1.5px solid rgba(0,119,182,0.2);
            border-radius: 10px; padding: 7px 14px; color: #0077b6;
            font-size: 0.82rem; font-weight: 600; font-family: 'Inter', sans-serif;
            cursor: pointer; transition: all 0.18s;
        }
        .btn-refresh:hover { background: rgba(0,119,182,0.06); border-color: rgba(0,119,182,0.4); }

        /* ── Filters ── */
        .filter-bar {
            display: flex; gap: 10px; flex-wrap: wrap;
            margin-bottom: 18px; align-items: center;
        }
        .filter-bar input, .filter-bar select {
            padding: 8px 12px; border-radius: 10px;
            border: 1.5px solid rgba(0,0,0,0.1); background: #fff;
            font-size: 0.84rem; font-family: 'Inter', sans-serif; color: #374151; outline: none;
            transition: border 0.18s, box-shadow 0.18s;
        }
        .filter-bar input:focus, .filter-bar select:focus {
            border-color: #0077b6; box-shadow: 0 0 0 3px rgba(0,119,182,0.12);
        }
        .filter-bar input { min-width: 200px; flex: 1; }
        .filter-bar select { min-width: 140px; }
        .filter-count {
            font-size: 0.78rem; font-weight: 600; color: #9ca3af;
            margin-left: auto; white-space: nowrap;
        }

        /* ── Table ── */
        .table-wrap { overflow-x: auto; }
        .admin-table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
        .admin-table thead tr { background: rgba(0,119,182,0.05); }
        .admin-table th {
            color: #0077b6; font-weight: 700; padding: 11px 14px; text-align: left;
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap;
        }
        .admin-table th:first-child { border-radius: 12px 0 0 12px; }
        .admin-table th:last-child { border-radius: 0 12px 12px 0; }
        .admin-table td {
            padding: 12px 14px; border-bottom: 1px solid rgba(0,0,0,0.04);
            vertical-align: middle; color: #374151;
        }
        .admin-table tr:last-child td { border-bottom: none; }
        .admin-table tbody tr { transition: background 0.14s; }
        .admin-table tbody tr:hover td { background: rgba(0,119,182,0.033); cursor: default; }

        /* ── Badges ── */
        .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; }
        .badge-green  { background: rgba(52,199,89,0.12); color: #1a8a3a; }
        .badge-red    { background: rgba(239,68,68,0.12); color: #c0392b; }
        .badge-blue   { background: rgba(0,119,182,0.12); color: #0077b6; }
        .badge-purple { background: rgba(124,58,237,0.12); color: #6d28d9; }
        .badge-grey   { background: rgba(142,142,147,0.12); color: #555; }

        /* ── Ver detalhe button ── */
        .btn-ver {
            padding: 5px 12px; border-radius: 8px;
            background: rgba(0,119,182,0.08); border: 1px solid rgba(0,119,182,0.18);
            color: #0077b6; font-size: 0.76rem; font-weight: 700;
            font-family: 'Inter', sans-serif; cursor: pointer; white-space: nowrap;
            transition: all 0.16s;
        }
        .btn-ver:hover { background: #0077b6; color: #fff; border-color: #0077b6; }

        /* ── Empty / Loading states ── */
        .empty-state {
            text-align: center; padding: 56px 20px; color: #9ca3af;
        }
        .empty-state svg { margin-bottom: 14px; opacity: 0.35; }
        .empty-state p { font-size: 0.88rem; line-height: 1.6; }
        .empty-state strong { display: block; font-size: 1rem; color: #6b7280; margin-bottom: 6px; }

        /* ── Modal ── */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
            z-index: 1000; align-items: center; justify-content: center; padding: 24px;
        }
        .modal-overlay.open { display: flex; }
        .modal-card {
            background: #fff; border-radius: 22px; width: 100%; max-width: 540px;
            max-height: 90vh; overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.22), 0 4px 16px rgba(0,0,0,0.1);
        }
        .modal-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 22px 24px 16px;
            border-bottom: 1.5px solid rgba(0,0,0,0.06);
        }
        .modal-title { font-size: 1rem; font-weight: 800; color: #1a1a2e; }
        .modal-close {
            width: 32px; height: 32px; border-radius: 10px; border: none;
            background: rgba(0,0,0,0.06); color: #6b7280;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 1.1rem; transition: background 0.15s;
        }
        .modal-close:hover { background: rgba(239,68,68,0.1); color: #ef4444; }
        .modal-body { padding: 22px 24px; }
        .modal-result-banner {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 16px; border-radius: 12px; margin-bottom: 20px; font-size: 0.86rem; font-weight: 600;
        }
        .modal-result-banner--ok  { background: rgba(52,199,89,0.1);  color: #1a8a3a; }
        .modal-result-banner--err { background: rgba(239,68,68,0.09); color: #c0392b; }
        .modal-section-label {
            font-size: 0.7rem; font-weight: 700; color: #9ca3af;
            text-transform: uppercase; letter-spacing: 0.07em; margin: 18px 0 10px;
        }
        .modal-row {
            display: flex; justify-content: space-between; align-items: baseline;
            padding: 9px 0; border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 0.86rem;
        }
        .modal-row:last-child { border-bottom: none; }
        .modal-row-label { color: #9ca3af; font-weight: 600; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.04em; }
        .modal-row-value { font-weight: 700; color: #1a1a2e; text-align: right; }
    </style>
</head>
<body>
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>

    <div class="fisc-main">

        <!-- ── Cabeçalho ── -->
        <div class="admin-header">
            <div>
                <div class="admin-title">
                    <div class="admin-title-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                        </svg>
                    </div>
                    Fiscalização
                </div>
                <div class="admin-sub">
                    <span>TUB — Sistema de Fiscalização</span>
                    <span class="admin-sub-pill">FISCALIZADOR</span>
                </div>
            </div>
            <div class="admin-header-right">
                <div class="admin-user-chip">
                    <div class="admin-user-avatar" id="user-initials">F</div>
                    <span class="admin-user-name" id="user-nome">Fiscalizador</span>
                </div>
                <button class="btn-logout" onclick="logout()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    Sair
                </button>
            </div>
        </div>

        <!-- ── Ação principal: Fiscalizar QR ── -->
        <a href="fiscalizar_qr.html" style="display:flex;align-items:center;gap:16px;
            background:linear-gradient(135deg,#0077b6 0%,#005f8e 100%);
            border-radius:20px;padding:20px 24px;margin-bottom:20px;
            text-decoration:none;color:#fff;
            box-shadow:0 6px 24px rgba(0,119,182,0.35);
            transition:transform 0.18s,box-shadow 0.18s;"
            onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 10px 32px rgba(0,119,182,0.45)'"
            onmouseout="this.style.transform='';this.style.boxShadow='0 6px 24px rgba(0,119,182,0.35)'">
            <div style="width:52px;height:52px;background:rgba(255,255,255,0.18);border-radius:16px;
                display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7" rx="1"></rect>
                    <rect x="14" y="3" width="7" height="7" rx="1"></rect>
                    <rect x="3" y="14" width="7" height="7" rx="1"></rect>
                    <path d="M14 14h3v3h-3z"></path>
                    <path d="M17 17h3v3h-3z"></path>
                    <path d="M14 17h0"></path>
                </svg>
            </div>
            <div>
                <div style="font-size:1.05rem;font-weight:800;letter-spacing:-0.01em;">Fiscalizar QR Code</div>
                <div style="font-size:0.82rem;color:rgba(255,255,255,0.78);margin-top:3px;">Verificar título do passageiro</div>
            </div>
            <svg style="margin-left:auto;flex-shrink:0;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
        </a>

        <!-- ── Cards de resumo ── -->
        <div class="stats-grid">
            <div class="stat-card stat-card-1">
                <div class="stat-icon stat-icon-1">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                </div>
                <div class="stat-number" id="stat-hoje">—</div>
                <div class="stat-label">Validações hoje</div>
            </div>
            <div class="stat-card stat-card-2">
                <div class="stat-icon stat-icon-2">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
                        <line x1="1" y1="10" x2="23" y2="10"></line>
                    </svg>
                </div>
                <div class="stat-number" id="stat-passes">—</div>
                <div class="stat-label">Passes validados</div>
            </div>
            <div class="stat-card stat-card-3">
                <div class="stat-icon stat-icon-3">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"></path>
                        <path d="M13 5v14"></path>
                    </svg>
                </div>
                <div class="stat-number" id="stat-bilhetes">—</div>
                <div class="stat-label">Bilhetes validados</div>
            </div>
            <div class="stat-card stat-card-4">
                <div class="stat-icon stat-icon-4">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                </div>
                <div class="stat-number" id="stat-falhados">—</div>
                <div class="stat-label">Rejeitados</div>
            </div>
        </div>

        <!-- ── Tabela de validações ── -->
        <div class="admin-section">
            <div class="section-title-row">
                <div class="section-title">
                    <div class="section-title-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0077b6" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="8" y1="6" x2="21" y2="6"></line>
                            <line x1="8" y1="12" x2="21" y2="12"></line>
                            <line x1="8" y1="18" x2="21" y2="18"></line>
                            <line x1="3" y1="6" x2="3.01" y2="6"></line>
                            <line x1="3" y1="12" x2="3.01" y2="12"></line>
                            <line x1="3" y1="18" x2="3.01" y2="18"></line>
                        </svg>
                    </div>
                    Validações Registadas
                </div>
                <button class="btn-refresh" onclick="carregarValidacoes()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="1 4 1 10 7 10"></polyline>
                        <path d="M3.51 15a9 9 0 1 0 .49-3.1"></path>
                    </svg>
                    Atualizar
                </button>
            </div>

            <!-- Filtros -->
            <div class="filter-bar">
                <input type="text" id="filtro-nome" placeholder="Pesquisar por passageiro…" oninput="aplicarFiltros()" autocomplete="off">
                <select id="filtro-tipo" onchange="aplicarFiltros()">
                    <option value="">Tipo: todos</option>
                    <option value="PASSE">Passe</option>
                    <option value="BILHETE">Bilhete</option>
                </select>
                <select id="filtro-estado" onchange="aplicarFiltros()">
                    <option value="">Estado: todos</option>
                    <option value="ok">Sucesso</option>
                    <option value="fail">Falhado</option>
                </select>
                <select id="filtro-linha" onchange="aplicarFiltros()">
                    <option value="">Linha: todas</option>
                </select>
                <span class="filter-count" id="filter-count"></span>
            </div>

            <!-- Tabela -->
            <div class="table-wrap">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Data / Hora</th>
                            <th>Passageiro</th>
                            <th>Tipo</th>
                            <th>Título</th>
                            <th>Linha</th>
                            <th>Estado</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="tabela-body">
                        <tr>
                            <td colspan="7">
                                <div class="empty-state">
                                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.5">
                                        <circle cx="12" cy="12" r="10"></circle>
                                        <line x1="12" y1="8" x2="12" y2="12"></line>
                                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                                    </svg>
                                    <p><strong>A carregar…</strong></p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div><!-- /fisc-main -->

    <!-- ── Modal de detalhe ── -->
    <div class="modal-overlay" id="modal-overlay" onclick="fecharModalSeFora(event)">
        <div class="modal-card" id="modal-card">
            <div class="modal-header">
                <div class="modal-title">Detalhe da Validação</div>
                <button class="modal-close" onclick="fecharModal()" aria-label="Fechar">✕</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <script>
        const API = '';

        let todosRegistos = [];

        const ESTATUTO_LABELS = {
            'SEM_ESTATUTO': 'Normal', 'ESTUDANTE': 'Estudante', 'RESIDENTE': 'Residente',
            'SENIOR': 'Sénior', 'MILITAR': 'Militar / Ex-combatente',
            'CRIANCA': 'Criança', 'INCAPACITADO': 'Incapacitado',
        };

        const ESTADO_PASSE_LABELS = {
            'ACTIVE': 'Ativo', 'INACTIVE': 'Inativo', 'FALTA_RENOVAR': 'Expirado',
        };

        const ESTADO_BILHETE_LABELS = {
            'PAID': 'Pago', 'USED': 'Utilizado', 'PENDING': 'Pendente',
            'CANCELLED': 'Cancelado', 'FAILED': 'Falhado', 'NOT_STARTED': 'Não iniciado',
        };

        const MOTIVO_LABELS = {
            'TOKEN_EXPIRADO': 'QR expirado', 'TOKEN_REVOGADO': 'QR revogado',
            'TOKEN_NAO_ENCONTRADO': 'QR não reconhecido', 'PASSE_EXPIRADO': 'Passe expirado',
            'PASSE_NAO_INICIADO': 'Passe não iniciado', 'PASSE_INATIVO': 'Passe inativo',
            'PASSE_INVALIDO': 'Passe inválido', 'BILHETE_JA_USADO': 'Bilhete já utilizado',
            'BILHETE_NAO_PAGO': 'Bilhete não pago', 'BILHETE_EXPIRADO': 'Bilhete expirado',
        };

        // ── Formatação ────────────────────────────────────────────────────────

        function formatDataHora(s) {
            if (!s) return '—';
            const d = new Date(s);
            if (isNaN(d.getTime())) return s;
            return d.toLocaleDateString('pt-PT', { day: '2-digit', month: '2-digit', year: 'numeric' })
                + ' ' + d.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });
        }

        function formatData(s) {
            if (!s) return '—';
            const p = s.split('-');
            if (p.length === 3) return `${p[2]}/${p[1]}/${p[0]}`;
            return s;
        }

        function escapeHtml(v) {
            return String(v ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }

        // ── Carregar dados ────────────────────────────────────────────────────

        async function carregarValidacoes() {
            document.getElementById('tabela-body').innerHTML = `
                <tr><td colspan="7"><div class="empty-state">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.5">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                    <p><strong>A carregar validações…</strong></p>
                </div></td></tr>`;

            try {
                const res = await fetch(`${API}/api/fiscalizacao/validacoes`, { credentials: 'include' });

                if (res.status === 401 || res.status === 403) {
                    mostrarErroTabela('Sessão expirada ou sem permissão. Por favor faça login novamente.');
                    return;
                }
                if (!res.ok) {
                    mostrarErroTabela(`Erro ${res.status} ao carregar validações.`);
                    return;
                }

                todosRegistos = await res.json();
                calcularMetricas();
                popularFiltroLinhas();
                aplicarFiltros();

            } catch (e) {
                mostrarErroTabela('Não foi possível contactar o servidor. Verifique a ligação.');
            }
        }

        function mostrarErroTabela(msg) {
            document.getElementById('tabela-body').innerHTML = `
                <tr><td colspan="7"><div class="empty-state">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="1.5">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                    <p><strong>Erro</strong>${escapeHtml(msg)}</p>
                </div></td></tr>`;
        }

        // ── Métricas ──────────────────────────────────────────────────────────

        function calcularMetricas() {
            const hoje = new Date().toISOString().slice(0, 10);
            const hojeCount  = todosRegistos.filter(r => r.dataValidacao && r.dataValidacao.startsWith(hoje)).length;
            const passesOk   = todosRegistos.filter(r => r.tipoTitulo === 'PASSE'    && r.resultado).length;
            const bilhetesOk = todosRegistos.filter(r => r.tipoTitulo === 'BILHETE'  && r.resultado).length;
            const falhados   = todosRegistos.filter(r => !r.resultado).length;

            document.getElementById('stat-hoje').textContent     = hojeCount;
            document.getElementById('stat-passes').textContent   = passesOk;
            document.getElementById('stat-bilhetes').textContent = bilhetesOk;
            document.getElementById('stat-falhados').textContent = falhados;
        }

        // ── Filtro de linhas (populado dinamicamente) ─────────────────────────

        function popularFiltroLinhas() {
            const sel = document.getElementById('filtro-linha');
            const linhas = [...new Set(todosRegistos.map(r => r.linha).filter(Boolean))].sort();
            sel.innerHTML = '<option value="">Linha: todas</option>'
                + linhas.map(l => `<option value="${escapeHtml(l)}">${escapeHtml(l)}</option>`).join('');
        }

        // ── Filtros + render ──────────────────────────────────────────────────

        function aplicarFiltros() {
            const nome   = document.getElementById('filtro-nome').value.toLowerCase().trim();
            const tipo   = document.getElementById('filtro-tipo').value;
            const estado = document.getElementById('filtro-estado').value;
            const linha  = document.getElementById('filtro-linha').value;

            const filtrados = todosRegistos.filter(r => {
                if (nome   && !(r.nomeTitular || '').toLowerCase().includes(nome)) return false;
                if (tipo   && r.tipoTitulo !== tipo) return false;
                if (estado === 'ok'   && !r.resultado) return false;
                if (estado === 'fail' && r.resultado)  return false;
                if (linha  && r.linha !== linha) return false;
                return true;
            });

            document.getElementById('filter-count').textContent =
                filtrados.length === todosRegistos.length
                    ? `${todosRegistos.length} registos`
                    : `${filtrados.length} de ${todosRegistos.length} registos`;

            renderTabela(filtrados);
        }

        // ── Render tabela ─────────────────────────────────────────────────────

        function renderTabela(dados) {
            if (dados.length === 0) {
                document.getElementById('tabela-body').innerHTML = `
                    <tr><td colspan="7"><div class="empty-state">
                        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.5">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                        </svg>
                        <p><strong>Sem validações</strong>Nenhum registo corresponde aos filtros aplicados.</p>
                    </div></td></tr>`;
                return;
            }

            document.getElementById('tabela-body').innerHTML = dados.map(r => {
                const estadoBadge = r.resultado
                    ? '<span class="badge badge-green">✓ Sucesso</span>'
                    : '<span class="badge badge-red">✗ Falhado</span>';

                const tipoBadge = r.tipoTitulo === 'PASSE'
                    ? '<span class="badge badge-purple">Passe</span>'
                    : r.tipoTitulo === 'BILHETE'
                        ? '<span class="badge badge-blue">Bilhete</span>'
                        : '<span class="badge badge-grey">—</span>';

                return `<tr>
                    <td style="white-space:nowrap;color:#6b7280;font-size:0.8rem;">${escapeHtml(formatDataHora(r.dataValidacao))}</td>
                    <td style="font-weight:600;">${escapeHtml(r.nomeTitular || '—')}</td>
                    <td>${tipoBadge}</td>
                    <td style="color:#6b7280;">${escapeHtml(r.tipoDescricao || '—')}</td>
                    <td style="color:#6b7280;font-size:0.8rem;">${escapeHtml(r.linha || '—')}</td>
                    <td>${estadoBadge}</td>
                    <td><button class="btn-ver" onclick="verDetalhe(${r.id})">Ver</button></td>
                </tr>`;
            }).join('');
        }

        // ── Modal de detalhe ──────────────────────────────────────────────────

        function verDetalhe(id) {
            const r = todosRegistos.find(x => x.id === id);
            if (!r) return;

            const banner = r.resultado
                ? `<div class="modal-result-banner modal-result-banner--ok">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1a8a3a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    Validação bem-sucedida
                   </div>`
                : `<div class="modal-result-banner modal-result-banner--err">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#c0392b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    ${escapeHtml(MOTIVO_LABELS[r.motivoRejeicao] || r.motivoRejeicao || 'Validação falhada')}
                   </div>`;

            const rowGeral = (label, value) => value
                ? `<div class="modal-row">
                    <span class="modal-row-label">${label}</span>
                    <span class="modal-row-value">${escapeHtml(value)}</span>
                   </div>` : '';

            let detalhesEspecificos = '';

            if (r.tipoTitulo === 'PASSE') {
                detalhesEspecificos = `
                    <div class="modal-section-label">Dados do Passe</div>
                    ${rowGeral('Titular', r.nomeTitular)}
                    ${rowGeral('Tipo de Passe', r.tipoPasse)}
                    ${rowGeral('Coroa / Zona', r.coroa)}
                    ${r.estatuto ? `<div class="modal-row">
                        <span class="modal-row-label">Estatuto</span>
                        <span class="modal-row-value"><span class="badge badge-blue">${escapeHtml(ESTATUTO_LABELS[r.estatuto] || r.estatuto)}</span></span>
                    </div>` : ''}
                    ${rowGeral('Válido de', formatData(r.validadeInicio))}
                    ${rowGeral('Válido até', formatData(r.validadeFim))}
                    ${r.estadoPasse ? `<div class="modal-row">
                        <span class="modal-row-label">Estado do Passe</span>
                        <span class="modal-row-value">${escapeHtml(ESTADO_PASSE_LABELS[r.estadoPasse] || r.estadoPasse)}</span>
                    </div>` : ''}`;
            } else if (r.tipoTitulo === 'BILHETE') {
                detalhesEspecificos = `
                    <div class="modal-section-label">Dados do Bilhete</div>
                    ${rowGeral('Passageiro', r.nomeTitular)}
                    ${rowGeral('Tipo de Bilhete', r.tipoBilhete)}
                    ${rowGeral('Linha', r.linha)}
                    ${rowGeral('Data de Compra', formatData(r.dataCompra))}
                    ${rowGeral('Válido até', formatData(r.validadeFim))}
                    ${r.estadoBilhete ? `<div class="modal-row">
                        <span class="modal-row-label">Estado do Bilhete</span>
                        <span class="modal-row-value">${escapeHtml(ESTADO_BILHETE_LABELS[r.estadoBilhete] || r.estadoBilhete)}</span>
                    </div>` : ''}`;
            }

            document.getElementById('modal-body').innerHTML = `
                ${banner}
                <div class="modal-section-label">Informação da Validação</div>
                ${rowGeral('Data / Hora', formatDataHora(r.dataValidacao))}
                ${rowGeral('Tipo de Título', r.tipoTitulo === 'PASSE' ? 'Passe' : r.tipoTitulo === 'BILHETE' ? 'Bilhete' : r.tipoTitulo)}
                ${rowGeral('Descrição', r.tipoDescricao)}
                ${rowGeral('Linha', r.linha)}
                ${detalhesEspecificos}`;

            document.getElementById('modal-overlay').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function fecharModal() {
            document.getElementById('modal-overlay').classList.remove('open');
            document.body.style.overflow = '';
        }

        function fecharModalSeFora(e) {
            if (e.target === document.getElementById('modal-overlay')) fecharModal();
        }

        document.addEventListener('keydown', e => { if (e.key === 'Escape') fecharModal(); });

        // ── Logout ────────────────────────────────────────────────────────────

        function logout() {
            fetch(`${API}/api/logout`, { method: 'POST', credentials: 'include' }).catch(() => {});
            ['nomeCompleto', 'perfil', 'role', 'idCliente', 'estatuto', 'estatutoAutomatico',
             'dataNascimento', 'morada', 'nif', 'telefone', 'cc'].forEach(k => localStorage.removeItem(k));
            window.location.href = 'index.html';
        }

        // ── Init ──────────────────────────────────────────────────────────────

        document.addEventListener('DOMContentLoaded', function () {
            const nome = localStorage.getItem('nomeCompleto');
            if (nome) {
                document.getElementById('user-nome').textContent = nome;
                document.getElementById('user-initials').textContent = nome.split(' ').map(p => p[0]).join('').slice(0, 2).toUpperCase();
            }
            carregarValidacoes();
        });
    </script>
</body>
</html>
