<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TUB – Pagamentos</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#0f8bb5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="TUB">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="subpage.css">
    <style>
        /* ── Segment control ── */
        .seg-control {
            display: flex; gap: 4px; padding: 4px;
            background: rgba(255,255,255,0.65);
            backdrop-filter: blur(20px) saturate(160%);
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 14px;
        }
        .seg-btn {
            flex: 1; padding: 9px; border-radius: 10px; border: none;
            font-size: 0.85rem; font-weight: 600; cursor: pointer;
            font-family: 'Inter', sans-serif; background: transparent;
            color: #6b7280; transition: all 0.2s; margin: 0;
        }
        .seg-btn--active {
            background: #fff; color: var(--tub-nav);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        /* ── Section label acima dos cards ── */
        .pag-section-label {
            font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em;
            text-transform: uppercase; color: rgba(255,255,255,0.72);
            padding: 0 2px; margin-bottom: 8px;
        }

        /* ── Lista de cards ── */
        .pag-card-list { display: flex; flex-direction: column; gap: 8px; }

        /* ── Accordion card ── */
        .pag-card {
            background: rgba(255,255,255,0.72);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.55);
            border-radius: 18px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.07);
            overflow: hidden;
            transition: box-shadow 0.22s ease, border-color 0.22s ease;
        }
        .pag-card--open {
            box-shadow: 0 6px 24px rgba(0,119,182,0.14);
            border-color: rgba(0,119,182,0.2);
        }

        .pag-card-header {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .pag-card-header:active { background: rgba(0,0,0,0.03); }

        /* ── Icon ── */
        .pag-icon {
            width: 36px; height: 36px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .pag-icon--passe   { background: rgba(0,162,232,0.12); color: #0077b6; }
        .pag-icon--bilhete { background: rgba(45,212,191,0.15); color: #0d9488; }
        .pag-icon--fat     { background: rgba(52,199,89,0.12);  color: #1aa855; }

        /* ── Texto ── */
        .pag-card-info { flex: 1; min-width: 0; }
        .pag-titulo { font-size: 0.88rem; font-weight: 700; color: #1a1a2e; overflow-wrap: break-word; }
        .pag-sub    { font-size: 0.72rem; color: #9ca3af; margin-top: 2px; overflow-wrap: break-word; }

        /* ── Valor e estado (lado direito) ── */
        .pag-card-right { text-align: right; flex-shrink: 0; }
        .pag-valor { font-size: 0.9rem; font-weight: 800; color: #1a1a2e; white-space: nowrap; }
        .pag-estado {
            display: inline-block; padding: 2px 8px; border-radius: 20px;
            font-size: 0.65rem; font-weight: 700; letter-spacing: 0.04em; margin-top: 3px;
        }
        .pag-estado--pendente { background: rgba(255,149,0,0.12); color: #e07000; }
        .pag-estado--pago     { background: rgba(52,199,89,0.15);  color: #1aa855; }
        .pag-estado--outro    { background: rgba(156,163,175,0.1); color: #6b7280; }

        /* ── Chevron animado ── */
        .pag-chevron {
            flex-shrink: 0; color: #c4cad4;
            transition: transform 0.24s ease, color 0.2s ease;
            display: flex; align-items: center; padding-left: 2px;
        }
        .pag-card--open .pag-chevron { transform: rotate(180deg); color: var(--tub-nav); }

        /* ── Corpo colapsável (técnica grid-rows para animação suave) ── */
        .pag-card-body {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.26s ease;
        }
        .pag-card--open .pag-card-body { grid-template-rows: 1fr; }
        .pag-card-body-inner { overflow: hidden; }

        .pag-card-divider { height: 1px; background: rgba(0,119,182,0.07); margin: 0 14px; }

        /* ── Linhas de detalhe no interior ── */
        .pag-detail-rows {
            padding: 12px 14px; display: flex; flex-direction: column; gap: 9px;
        }
        .pag-detail-row {
            display: flex; justify-content: space-between; align-items: flex-start;
            font-size: 0.8rem; gap: 16px;
        }
        .pag-detail-label { color: #9ca3af; font-weight: 600; flex-shrink: 0; }
        .pag-detail-value { color: #1a1a2e; font-weight: 600; text-align: right; word-break: break-word; }

        .pag-detail-actions { padding: 4px 14px 14px; }

        /* ── Botões ── */
        .btn-pagar {
            padding: 9px 18px;
            background: linear-gradient(135deg, var(--tub-blue), var(--tub-dark-blue));
            color: #fff; border: none; border-radius: 12px;
            font-size: 0.82rem; font-weight: 700; font-family: 'Inter', sans-serif;
            cursor: pointer; width: 100%;
            box-shadow: 0 3px 10px rgba(0,162,232,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-pagar:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(0,162,232,0.4); }
        .btn-pagar:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .btn-pdf {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 16px; width: 100%; justify-content: center;
            background: rgba(0,162,232,0.08); color: var(--tub-nav);
            border-radius: 12px; font-size: 0.8rem; font-weight: 700;
            text-decoration: none; border: 1px solid rgba(0,162,232,0.2);
            transition: background 0.15s;
        }
        .btn-pdf:hover { background: rgba(0,162,232,0.16); }

        /* ── Estados gerais ── */
        .pag-empty { text-align: center; padding: 24px 16px; color: #9ca3af; font-size: 0.88rem; }
        .sp-feedback {
            padding: 12px 16px; border-radius: 14px;
            text-align: center; font-size: 0.85rem; font-weight: 600;
        }
        .sp-feedback--error   { background: rgba(239,68,68,0.1);  color: #ef4444; }
        .sp-feedback--success { background: rgba(52,199,89,0.1);   color: #1aa855; }

        /* ── Histórico toggle ── */
        .hist-toggle {
            display: flex; align-items: center; gap: 12px;
            cursor: pointer; user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .hist-toggle:active { background: rgba(0,0,0,0.02); }
        .hist-chevron {
            flex-shrink: 0; display: flex; align-items: center; color: #9ca3af;
            transition: transform 0.24s ease, color 0.2s ease;
        }
        .hist-toggle--open .hist-chevron { transform: rotate(180deg); color: var(--tub-nav); }

        /* ── Histórico content (fechado por defeito) ── */
        .hist-content { display: none; flex-direction: column; gap: 16px; }
        .hist-content.hist-content--aberto { display: flex; }

        /* ── Atalho para métodos de pagamento ── */
        .action-link-card {
            display: flex; align-items: center; gap: 12px;
            text-decoration: none; color: #1a1a2e; transition: opacity 0.15s;
        }
        .action-link-card:hover { opacity: 0.75; }
        .action-link-icon {
            width: 36px; height: 36px; border-radius: 10px;
            background: rgba(0,162,232,0.10); color: #0077b6;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="bg-shape shape2"></div>

        <a href="index.html" class="sp-back-btn" aria-label="Início">

                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#00a2e8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>

            </div>

            <a href="index.html" class="sp-cta-btn" style="text-decoration:none;display:inline-flex;gap:8px;align-items:center;">

            <!-- Histórico: botão toggle -->
            <div class="sp-card hist-toggle" id="hist-toggle-btn" onclick="toggleHistorico()">
                <div class="action-link-icon">

                <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>

    <script>
        const API = '';

        let faturasCarregadas = false;

        function toggleHistorico() {
            const content = document.getElementById('hist-content');
            const btn    = document.getElementById('hist-toggle-btn');
            const aberto = content.classList.toggle('hist-content--aberto');
            btn.classList.toggle('hist-toggle--open', aberto);
        }

        const TIPO_FAT_LABELS = {
            'PASSE': 'Passe', 'BILHETE': 'Bilhete', 'CARREGAMENTO': 'Carregamento'
        };

        function formatPreco(v) {
            return v != null ? parseFloat(v).toLocaleString('pt-PT', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €' : '—';
        }

        function isPendente(item) {
            return item.estadoPagamento === 'PENDING_PAYMENT'
                || item.estadoPagamento === 'NOT_STARTED'
                || item.estadoPagamento === 'PENDING';
        }

        function estadoLabel(item) {
            const p = item.estadoPagamento;
            if (p === 'PAID') return { label: 'Pago', cls: 'pago' };
            if (isPendente(item)) return { label: 'Pendente', cls: 'pendente' };
            return { label: p || '—', cls: 'outro' };
        }

        // ── Ícones SVG reutilizados ───────────────────────────────────────────
        const SVG_PASSE   = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg>`;
        const SVG_BILHETE = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2z"></path><line x1="9" y1="12" x2="15" y2="12"></line></svg>`;
        const SVG_DOC     = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>`;
        const SVG_CHEVRON = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>`;
        const SVG_PDF     = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>`;

        // ── Accordion: estado ─────────────────────────────────────────────────
        let _openCardId = null;

        function toggleCard(cardId) {
            const card = document.getElementById('card-' + cardId);
            if (!card) return;
            const isOpen = card.classList.contains('pag-card--open');
            // Fechar o card anteriormente aberto (comportamento accordion)
            if (_openCardId && _openCardId !== cardId) {
                const prev = document.getElementById('card-' + _openCardId);
                if (prev) prev.classList.remove('pag-card--open');
            }
            card.classList.toggle('pag-card--open', !isOpen);
            _openCardId = isOpen ? null : cardId;
        }

        // ── Helper: linha de detalhe (só renderiza se o valor existir) ─────────
        function detailRow(label, value) {
            if (value == null || value === '' || value === 'null' || value === 'undefined') return '';
            return `<div class="pag-detail-row"><span class="pag-detail-label">${label}</span><span class="pag-detail-value">${value}</span></div>`;
        }

        // ── Renderizar item de pagamento (accordion card) ─────────────────────
        function renderItem(item) {
            const isPasse  = item.tipoObjeto === 'PASSE';
            const { label, cls } = estadoLabel(item);
            const pendente = isPendente(item);
            const cardId   = `${item.tipoObjeto}-${item.objetoId}`;

            const detalheRows = [
                detailRow('Tipo',    isPasse ? 'Passe' : 'Bilhete'),
                detailRow('Estado',  label),
                detailRow('Fatura',  item.faturaNumero),
                detailRow('Ref.',    item.objetoId != null ? '#' + item.objetoId : null),
            ].filter(Boolean).join('');

            const bodyActions = pendente
                ? `<div class="pag-detail-actions"><button class="btn-pagar" onclick="pagar('${item.tipoObjeto}', ${item.objetoId}, this)">Pagar agora</button></div>`
                : '';

            return `<div class="pag-card" id="card-${cardId}">
                <div class="pag-card-header" onclick="toggleCard('${cardId}')">
                    <div class="pag-icon pag-icon--${isPasse ? 'passe' : 'bilhete'}">${isPasse ? SVG_PASSE : SVG_BILHETE}</div>
                    <div class="pag-card-info">
                        <div class="pag-titulo">${item.titulo}</div>
                        ${item.detalhe ? `<div class="pag-sub">${item.detalhe}</div>` : ''}
                    </div>
                    <div class="pag-card-right">
                        <div class="pag-valor">${formatPreco(item.quantia)}</div>
                        <span class="pag-estado pag-estado--${cls}">${label}</span>
                    </div>
                    <div class="pag-chevron">${SVG_CHEVRON}</div>
                </div>
                <div class="pag-card-body">
                    <div class="pag-card-body-inner">
                        <div class="pag-card-divider"></div>
                        ${detalheRows ? `<div class="pag-detail-rows">${detalheRows}</div>` : ''}
                        ${bodyActions}
                    </div>
                </div>
            </div>`;
        }

        // ── Renderizar fatura (accordion card) ───────────────────────────────
        function renderFatura(f, idx) {
            const tipoLabel = TIPO_FAT_LABELS[f.tipoObjeto] || f.tipoObjeto || '';
            const cardId    = `fat-${idx}`;

            const detalheRows = [
                detailRow('Tipo', tipoLabel),
                detailRow('Referência', f.detalhe),
            ].filter(Boolean).join('');

            const pdfAction = f.pdfUrl
                ? `<div class="pag-detail-actions"><a href="${f.pdfUrl}" target="_blank" class="btn-pdf">${SVG_PDF} Transferir fatura em PDF</a></div>`
                : '';

            return `<div class="pag-card" id="card-${cardId}">
                <div class="pag-card-header" onclick="toggleCard('${cardId}')">
                    <div class="pag-icon pag-icon--fat">${SVG_DOC}</div>
                    <div class="pag-card-info">
                        <div class="pag-titulo">${f.titulo}</div>
                        ${f.detalhe ? `<div class="pag-sub">${f.detalhe}</div>` : (tipoLabel ? `<div class="pag-sub">${tipoLabel}</div>` : '')}
                    </div>
                    <div class="pag-card-right">
                        <div class="pag-valor">${formatPreco(f.quantia)}</div>
                    </div>
                    <div class="pag-chevron">${SVG_CHEVRON}</div>
                </div>
                <div class="pag-card-body">
                    <div class="pag-card-body-inner">
                        <div class="pag-card-divider"></div>
                        ${detalheRows ? `<div class="pag-detail-rows">${detalheRows}</div>` : ''}
                        ${pdfAction}
                    </div>
                </div>
            </div>`;
        }

        function mudarTab(tab) {
            const panelPag = document.getElementById('panel-pagamentos');
            const panelFat = document.getElementById('panel-faturas');
            panelPag.style.display = tab === 'pagamentos' ? 'flex' : 'none';
            panelFat.style.display = tab === 'faturas' ? 'block' : 'none';
            document.getElementById('tab-pagamentos').classList.toggle('seg-btn--active', tab === 'pagamentos');
            document.getElementById('tab-faturas').classList.toggle('seg-btn--active', tab === 'faturas');
            if (tab === 'faturas' && !faturasCarregadas) {
                faturasCarregadas = true;
                carregarFaturas();
            }
        }

        function mostrarAuthRequiredPagamentos() {
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('auth-required').style.display = '';
        }

        async function carregarPagamentos() {
            try {
                const res = await fetch(`${API}/api/user/pagamentos`, { credentials: 'include' });
                if (res.status === 401 || res.status === 403) { mostrarAuthRequiredPagamentos(); return; }
                if (!res.ok) throw new Error('Não autenticado');

                const itens = await res.json();
                document.getElementById('estado-inicial').style.display = 'none';

                const pendentes = itens.filter(isPendente);
                const pagos     = itens.filter(i => !isPendente(i));

                if (pendentes.length) {
                    document.getElementById('pendentes-lista').innerHTML = pendentes.map(renderItem).join('');
                    document.getElementById('pendentes-section').style.display = '';
                }
                if (pagos.length) {
                    document.getElementById('pagos-lista').innerHTML = pagos.map(renderItem).join('');
                    document.getElementById('pagos-section').style.display = '';
                }
                if (!itens.length) {
                    document.getElementById('estado-inicial').style.display = '';
                    document.getElementById('estado-inicial').innerHTML = '<p class="pag-empty">Não tens pagamentos registados.</p>';
                }

            } catch (e) {
                document.getElementById('main-content').style.display = 'none';
                document.getElementById('auth-required').style.display = '';
            }
        }

        async function carregarFaturas() {
            const lista = document.getElementById('faturas-lista');
            try {
                const res = await fetch(`${API}/api/user/faturas`, { credentials: 'include' });
                if (res.status === 401 || res.status === 403) { mostrarAuthRequiredPagamentos(); return; }
                if (!res.ok) throw new Error();
                const faturas = await res.json();

                if (!faturas.length) {
                    lista.innerHTML = '<div class="sp-card"><p class="pag-empty">Ainda não tens faturas emitidas.</p></div>';
                    return;
                }
                lista.innerHTML = faturas.map((f, i) => renderFatura(f, i)).join('');
            } catch(e) {
                lista.innerHTML = '<div class="sp-card"><p class="pag-empty" style="color:#ef4444;">Erro ao carregar faturas.</p></div>';
            }
        }

        async function pagar(tipoObjeto, objetoId, btn) {
            btn.disabled = true;
            btn.textContent = '…';
            const feedback = document.getElementById('feedback-global');
            feedback.style.display = 'none';

            try {
                const res = await fetch(`${API}/api/user/pagamentos/pagar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ tipoObjeto, objetoId })
                });
                if (res.status === 401 || res.status === 403) { mostrarAuthRequiredPagamentos(); return; }
                let data;
                try { data = await res.json(); } catch { data = {}; }

                if (res.ok) {
                    feedback.className = 'sp-feedback sp-feedback--success';
                    feedback.textContent = data.mensagem || 'Pagamento concluído!';
                    feedback.style.display = '';
                    document.getElementById('pendentes-section').style.display = 'none';
                    document.getElementById('pagos-section').style.display = 'none';
                    document.getElementById('estado-inicial').style.display = '';
                    document.getElementById('estado-inicial').innerHTML = '<p class="pag-empty">A atualizar…</p>';
                    setTimeout(carregarPagamentos, 600);
                } else {
                    feedback.className = 'sp-feedback sp-feedback--error';
                    feedback.textContent = data.message || 'Erro ao processar pagamento.';
                    feedback.style.display = '';
                    btn.disabled = false;
                    btn.textContent = 'Pagar';
                }
            } catch (e) {
                feedback.className = 'sp-feedback sp-feedback--error';
                feedback.textContent = 'Erro ao comunicar com o servidor.';
                feedback.style.display = '';
                btn.disabled = false;
                btn.textContent = 'Pagar';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (!localStorage.getItem('nomeCompleto')) {
                document.getElementById('main-content').style.display = 'none';
                document.getElementById('auth-required').style.display = '';
                return;
            }
            if (window.location.hash === '#faturas') {
                mudarTab('faturas');
            }
            carregarPagamentos();
        });
    </script>
    <script src="session-guard.js"></script>
</body>
</html>
