<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TUB - Historico de Viagens</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#0f8bb5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="TUB">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="subpage.css">
    <script src="session-guard.js"></script>
    <style>
        .history-filters {
            background: rgba(255,255,255,0.72);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.55);
            border-radius: 20px;
            padding: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .filter-title {
            font-size: 0.78rem; font-weight: 800; color: #6b7280;
            text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px;
        }
        .filter-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .filter-btn {
            width: auto; margin: 0; padding: 8px 14px; border-radius: 999px;
            border: 1px solid rgba(0,162,232,0.28); background: rgba(255,255,255,0.65);
            color: var(--tub-nav); font-size: 0.84rem; font-weight: 700;
        }
        .filter-btn.active { background: var(--tub-blue); color: #fff; border-color: var(--tub-blue); }
        .viagem-item {
            background: rgba(255,255,255,0.78);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.55);
            border-radius: 18px;
            padding: 16px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.07);
        }
        .viagem-header {
            display: flex; justify-content: space-between; align-items: center;
            gap: 12px; margin-bottom: 10px;
        }
        .viagem-tipo {
            display: inline-flex; align-items: center; padding: 4px 10px;
            border-radius: 999px; font-size: 0.72rem; font-weight: 800;
            letter-spacing: 0.04em;
        }
        .viagem-tipo.passe { background: rgba(0,162,232,0.12); color: var(--tub-nav); }
        .viagem-tipo.bilhete { background: rgba(52,199,89,0.12); color: #1a8a3a; }
        .viagem-data {
            font-size: 0.82rem; color: #6b7280; font-weight: 700; text-align: right;
        }
        .viagem-linha {
            display: flex; align-items: flex-start; gap: 8px;
            font-size: 0.94rem; font-weight: 700; color: var(--text-dark);
            line-height: 1.35; margin-bottom: 5px;
        }
        .viagem-linha svg { flex-shrink: 0; margin-top: 1px; color: var(--tub-nav); }
        .viagem-detalhes { font-size: 0.82rem; color: #6b7280; line-height: 1.4; }
        .history-list { display: flex; flex-direction: column; gap: 12px; }
        .empty-state {
            text-align: center; padding: 38px 20px; color: #6b7280;
            background: rgba(255,255,255,0.62); border-radius: 20px;
        }
        .empty-icon {
            width: 60px; height: 60px; margin: 0 auto 14px; border-radius: 18px;
            background: rgba(0,162,232,0.1); display: flex; align-items: center; justify-content: center;
        }
        @media (max-width: 360px) {
            .viagem-header { align-items: flex-start; flex-direction: column; gap: 6px; }
            .viagem-data { text-align: left; }
        }
    </style>
</head>
<body>
<div class="bg-shape shape1"></div>
<div class="bg-shape shape2"></div>

<header class="sp-header">
    <a href="perfil.html" class="sp-back-btn" aria-label="Voltar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
    </a>
    <h1 class="sp-page-title">Historico de Viagens</h1>
    <div class="sp-header-right"></div>
</header>

<main class="kf-main">
    <section class="history-filters">
        <div class="filter-title">Filtrar por tipo</div>
        <div class="filter-buttons" id="filter-buttons">
            <button class="filter-btn active" type="button" data-tipo="TODOS">Todos</button>
            <button class="filter-btn" type="button" data-tipo="PASSE">Passes</button>
            <button class="filter-btn" type="button" data-tipo="BILHETE">Bilhetes</button>
        </div>
    </section>

    <div id="historico-container" class="history-list">
        <div class="empty-state">A carregar historico...</div>
    </div>

    <div id="load-more-container" style="text-align:center;display:none;">
        <button class="sp-cta-btn" type="button" onclick="carregarMais()">Carregar mais viagens</button>
    </div>
</main>

<nav class="kf-bottom-nav" aria-label="Navegacao principal">
    <a href="index.html" class="kf-nav-item">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        </svg>
        <span>Inicio</span>
    </a>
    <a href="carteira.html" class="kf-nav-item">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="5" width="20" height="14" rx="2"></rect>
        </svg>
        <span>Carteira</span>
    </a>
    <a href="pagamentos.html" class="kf-nav-item">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
            <line x1="1" y1="10" x2="23" y2="10"></line>
        </svg>
        <span>Pagamentos</span>
    </a>
    <a href="perfil.html" class="kf-nav-item kf-nav-item--active" aria-current="page">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
        </svg>
        <span>Perfil</span>
    </a>
</nav>

<script>
const API = '';
let paginaAtual = 0;
let filtroAtual = 'TODOS';
let totalPaginas = 0;

document.addEventListener('DOMContentLoaded', () => {
    if (!localStorage.getItem('nomeCompleto') || localStorage.getItem('role') === 'MOTORISTA') {
        window.location.replace('index.html');
        return;
    }

    document.getElementById('filter-buttons').addEventListener('click', (event) => {
        const btn = event.target.closest('.filter-btn');
        if (!btn) return;
        aplicarFiltro(btn.dataset.tipo, btn);
    });

    carregarHistorico(true);
});

async function carregarHistorico(reset = false) {
    if (reset) paginaAtual = 0;

    const params = new URLSearchParams({
        page: String(paginaAtual),
        size: '20'
    });
    if (filtroAtual !== 'TODOS') params.set('tipo', filtroAtual);

    try {
        const response = await fetch(`${API}/api/cliente/historico-viagens?${params.toString()}`, {
            credentials: 'include'
        });

        if (response.status === 401 || response.status === 403) {
            localStorage.clear();
            window.location.replace('index.html');
            return;
        }

        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.message || 'Erro ao carregar historico.');

        totalPaginas = data.totalPaginas || 0;
        renderizarHistorico(data, reset);
    } catch (error) {
        document.getElementById('historico-container').innerHTML = `
            <div class="empty-state">
                <p style="font-weight:700;color:#c0392b;margin-bottom:6px;">Nao foi possivel carregar o historico.</p>
                <p style="font-size:0.84rem;">${escapeHtml(error.message)}</p>
            </div>
        `;
        document.getElementById('load-more-container').style.display = 'none';
    }
}

function renderizarHistorico(data, reset) {
    const container = document.getElementById('historico-container');
    if (reset) container.innerHTML = '';

    const items = data.historico || [];
    if (!items.length && reset) {
        container.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">
                    <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="var(--tub-blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                </div>
                <p style="font-size:1rem;font-weight:800;color:#1a1a2e;margin-bottom:7px;">Sem viagens registadas</p>
                <p style="font-size:0.85rem;line-height:1.45;">As validacoes de bilhetes e passes aparecerao aqui.</p>
            </div>
        `;
        document.getElementById('load-more-container').style.display = 'none';
        return;
    }

    items.forEach((viagem) => {
        const tipoClass = (viagem.tipoTitulo || '').toLowerCase();
        const item = document.createElement('article');
        item.className = 'viagem-item';
        item.innerHTML = `
            <div class="viagem-header">
                <span class="viagem-tipo ${escapeHtml(tipoClass)}">${escapeHtml(viagem.tipoTitulo || '')}</span>
                <span class="viagem-data">${escapeHtml(formatarData(viagem.dataValidacao))}</span>
            </div>
            <div class="viagem-linha">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="16" rx="2" ry="2"></rect>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                    <line x1="9" y1="16" x2="9.01" y2="16"></line>
                    <line x1="15" y1="16" x2="15.01" y2="16"></line>
                </svg>
                <span>${escapeHtml(viagem.linha || 'Linha nao especificada')}</span>
            </div>
            <div class="viagem-detalhes">
                ${escapeHtml(viagem.tipoDescricao || '')}${viagem.detalhes ? ` &bull; ${escapeHtml(viagem.detalhes)}` : ''}
            </div>
        `;
        container.appendChild(item);
    });

    document.getElementById('load-more-container').style.display =
        paginaAtual + 1 < totalPaginas ? 'block' : 'none';
}

function aplicarFiltro(tipo, botao) {
    filtroAtual = tipo;
    document.querySelectorAll('.filter-btn').forEach((btn) => btn.classList.remove('active'));
    botao.classList.add('active');
    carregarHistorico(true);
}

function carregarMais() {
    if (paginaAtual + 1 >= totalPaginas) return;
    paginaAtual++;
    carregarHistorico(false);
}

function formatarData(dataISO) {
    if (!dataISO) return '';
    const data = new Date(dataISO);
    if (Number.isNaN(data.getTime())) return dataISO;
    return data.toLocaleString('pt-PT', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
    });
}

function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
    }[char]));
}
</script>
</body>
</html>
