<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TUB – Métodos de Pagamento</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#0f8bb5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="TUB">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="subpage.css">
    <style>
        /* ── Card rows ── */
        .card-row {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .card-row:last-child { border-bottom: none; padding-bottom: 0; }
        .card-icon {
            width: 44px; height: 44px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; font-size: 20px;
            background: rgba(0,162,232,0.10); color: #0077b6;
        }
        .card-icon.visa       { background: rgba(26,31,113,0.10); color: #1a1f71; }
        .card-icon.mastercard { background: rgba(235,0,27,0.10);  color: #eb001b; }
        .card-icon.amex       { background: rgba(0,122,194,0.10); color: #007ac2; }
        .card-info { flex: 1; min-width: 0; }
        .card-nome    { font-weight: 600; font-size: 0.92rem; color: #1a1a2e; }
        .card-detalhe { font-size: 0.80rem; color: #64748b; margin-top: 2px; }
        .badge-predef {
            display: inline-block;
            background: rgba(0,162,232,0.12); color: #0077b6;
            font-size: 0.70rem; font-weight: 600;
            padding: 2px 8px; border-radius: 20px; margin-left: 6px;
            vertical-align: middle;
        }
        .card-actions { display: flex; gap: 8px; flex-shrink: 0; }
        .btn-icon {
            width: 36px; height: 36px; border-radius: 10px; border: none;
            cursor: pointer; font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s;
        }
        .btn-icon.predef  { background: rgba(0,162,232,0.12); color: #0077b6; }
        .btn-icon.predef:hover { background: rgba(0,162,232,0.22); }
        .btn-icon.predef:disabled { opacity: 0.35; cursor: default; }
        .btn-icon.remover { background: rgba(239,68,68,0.10); color: #dc2626; }
        .btn-icon.remover:hover { background: rgba(239,68,68,0.20); }

        /* ── Form fields ── */
        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block; font-size: 0.82rem;
            font-weight: 600; color: #374151; margin-bottom: 5px;
        }
        .form-group input {
            width: 100%; padding: 10px 12px; border-radius: 10px;
            border: 1.5px solid #e2e8f0; font-size: 0.92rem;
            font-family: inherit; color: #1a1a2e;
            background: rgba(255,255,255,0.8);
            box-sizing: border-box; transition: border-color 0.15s;
        }
        .form-group input:focus { outline: none; border-color: #00a2e8; }
        .form-group input.erro  { border-color: #dc2626; }

        .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .form-row .form-group { flex: 1; min-width: 90px; }

        .form-btns { display: flex; gap: 10px; margin-top: 8px; }
        .form-btns > button { flex: 1; margin-bottom: 0; }
        @media (max-width: 360px) {
            .form-btns { flex-direction: column; }
            .form-btns > button { flex: none; width: 100%; }
        }

        /* ── Feedback messages ── */
        .msg-erro {
            background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2);
            color: #dc2626; border-radius: 10px; padding: 10px 14px;
            font-size: 0.88rem; margin-bottom: 14px; display: none;
        }
        .msg-sucesso {
            background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.2);
            color: #16a34a; border-radius: 10px; padding: 10px 14px;
            font-size: 0.88rem; margin-bottom: 14px; display: none;
        }

        /* ── Empty state ── */
        .empty-state {
            text-align: center; padding: 32px 20px;
            color: #94a3b8; font-size: 0.92rem;
        }
        .empty-state .icon { font-size: 2.4rem; margin-bottom: 8px; }

        /* ── Misc ── */
        #btn-novo  { margin-bottom: 14px; }
        #form-novo { display: none; }
    </style>
</head>
<body>
<script src="session-guard.js"></script>
<div class="bg-shape shape1"></div>
<div class="bg-shape shape2"></div>

<header class="sp-header">
    <a href="index.html" class="sp-back-btn" aria-label="Início">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
    </a>
    <h1 class="sp-page-title">Métodos de Pagamento</h1>
    <div class="sp-header-right"></div>
</header>

<main class="kf-main" style="padding-bottom:40px;">

    <!-- Mensagens globais -->
    <div class="msg-erro"    id="msg-erro"></div>
    <div class="msg-sucesso" id="msg-sucesso"></div>

    <!-- Botão abrir formulário -->
    <button class="btn-primary" id="btn-novo" onclick="toggleFormNovo()">+ Associar novo cartão</button>

    <!-- Formulário de novo cartão -->
    <div class="sp-card" id="form-novo" style="margin-bottom:14px;">
        <h2 style="font-size:1rem;font-weight:700;color:#1a1a2e;margin:0 0 16px;">Novo cartão</h2>
        <div class="msg-erro" id="form-erro"></div>

        <div class="form-group">
            <label for="nomeTitular">Nome do titular</label>
            <input type="text" id="nomeTitular" placeholder="Como aparece no cartão" autocomplete="cc-name">
        </div>
        <div class="form-group">
            <label for="numeroCartao">Número do cartão</label>
            <input type="text" id="numeroCartao" placeholder="0000 0000 0000 0000"
                   maxlength="23" autocomplete="cc-number" oninput="formatarNumero(this)">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="mesValidade">Mês (MM)</label>
                <input type="number" id="mesValidade" placeholder="12" min="1" max="12" autocomplete="cc-exp-month">
            </div>
            <div class="form-group">
                <label for="anoValidade">Ano (AAAA)</label>
                <input type="number" id="anoValidade" placeholder="2028" autocomplete="cc-exp-year">
            </div>
            <div class="form-group">
                <label for="cvv">CVV</label>
                <input type="password" id="cvv" placeholder="***" maxlength="4" autocomplete="cc-csc">
            </div>
        </div>

        <div class="form-btns">
            <button class="btn-primary" onclick="associarCartao()" id="btn-submit">Associar cartão</button>
            <button class="btn-secondary" onclick="toggleFormNovo()">Cancelar</button>
        </div>
    </div>

    <!-- Lista de cartões -->
    <div class="sp-card">
        <h2 class="sp-section-title">Os Meus Cartões</h2>
        <div id="lista-cartoes">
            <div class="empty-state">
                <div class="icon">&#128179;</div>
                <div>A carregar cartões...</div>
            </div>
        </div>
    </div>

</main>

<script>
const API = '/api/user/cartoes';

async function carregarCartoes() {
    try {
        const res = await fetch(API, { credentials: 'include' });
        if (!res.ok) throw new Error('Erro ao carregar cartões.');
        const cartoes = await res.json();
        renderCartoes(cartoes);
    } catch (e) {
        mostrarErro(e.message);
    }
}

function renderCartoes(cartoes) {
    const container = document.getElementById('lista-cartoes');
    if (!cartoes.length) {
        container.innerHTML = `
            <div class="empty-state">
                <div class="icon">&#128179;</div>
                <div>Nenhum cartão associado à conta.</div>
            </div>`;
        return;
    }
    container.innerHTML = cartoes.map(c => `
        <div class="card-row" id="card-${c.id}">
            <div class="card-icon ${c.bandeira.toLowerCase()}">${icone(c.bandeira)}</div>
            <div class="card-info">
                <div class="card-nome">
                    ${c.bandeira} •••• ${c.ultimos4Digitos}
                    ${c.predefinido ? '<span class="badge-predef">Predefinido</span>' : ''}
                </div>
                <div class="card-detalhe">${c.nomeTitular} · Validade ${String(c.mesValidade).padStart(2,'0')}/${c.anoValidade}</div>
            </div>
            <div class="card-actions">
                <button class="btn-icon predef" title="Definir como predefinido"
                    onclick="definirPredefinido(${c.id})"
                    ${c.predefinido ? 'disabled' : ''}>&#9733;</button>
                <button class="btn-icon remover" title="Remover cartão"
                    onclick="removerCartao(${c.id})">&#128465;</button>
            </div>
        </div>
    `).join('');
}

function icone(bandeira) {
    const map = { VISA: '&#x1F4B3;', MASTERCARD: '&#x1F4B3;', AMEX: '&#x1F4B3;', DISCOVER: '&#x1F4B3;' };
    return map[bandeira] || '&#128179;';
}

async function associarCartao() {
    esconderMensagens();
    const btn = document.getElementById('btn-submit');
    btn.disabled = true;

    const body = {
        nomeTitular: document.getElementById('nomeTitular').value,
        numeroCartao: document.getElementById('numeroCartao').value.replace(/\s/g, ''),
        cvv: document.getElementById('cvv').value,
        mesValidade: parseInt(document.getElementById('mesValidade').value, 10),
        anoValidade: parseInt(document.getElementById('anoValidade').value, 10)
    };

    try {
        const res = await fetch(API, {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        const data = await res.json();
        if (!res.ok) {
            mostrarErroForm(data.message || 'Erro ao associar cartão.');
        } else {
            limparFormulario();
            toggleFormNovo();
            mostrarSucesso('Cartão associado com sucesso!');
            await carregarCartoes();
        }
    } catch (e) {
        mostrarErroForm('Erro de rede. Tente novamente.');
    } finally {
        btn.disabled = false;
    }
}

async function definirPredefinido(id) {
    esconderMensagens();
    try {
        const res = await fetch(`${API}/${id}/predefinido`, {
            method: 'PUT', credentials: 'include'
        });
        const data = await res.json();
        if (!res.ok) {
            mostrarErro(data.message || 'Erro ao atualizar cartão.');
        } else {
            mostrarSucesso('Cartão predefinido atualizado.');
            await carregarCartoes();
        }
    } catch (e) {
        mostrarErro('Erro de rede. Tente novamente.');
    }
}

async function removerCartao(id) {
    if (!confirm('Remover este cartão da conta?')) return;
    esconderMensagens();
    try {
        const res = await fetch(`${API}/${id}`, {
            method: 'DELETE', credentials: 'include'
        });
        const data = await res.json();
        if (!res.ok) {
            mostrarErro(data.message || 'Erro ao remover cartão.');
        } else {
            mostrarSucesso('Cartão removido com sucesso.');
            await carregarCartoes();
        }
    } catch (e) {
        mostrarErro('Erro de rede. Tente novamente.');
    }
}

function toggleFormNovo() {
    const form = document.getElementById('form-novo');
    const visivel = form.style.display === 'block';
    form.style.display = visivel ? 'none' : 'block';
    if (!visivel) document.getElementById('nomeTitular').focus();
    esconderMensagens();
    if (visivel) limparFormulario();
}

function limparFormulario() {
    ['nomeTitular','numeroCartao','cvv','mesValidade','anoValidade'].forEach(id => {
        document.getElementById(id).value = '';
    });
    document.getElementById('form-erro').style.display = 'none';
}

function formatarNumero(input) {
    let val = input.value.replace(/\D/g, '').substring(0, 19);
    input.value = val.replace(/(.{4})/g, '$1 ').trim();
}

function mostrarErro(msg) {
    const el = document.getElementById('msg-erro');
    el.textContent = msg; el.style.display = 'block';
}
function mostrarErroForm(msg) {
    const el = document.getElementById('form-erro');
    el.textContent = msg; el.style.display = 'block';
}
function mostrarSucesso(msg) {
    const el = document.getElementById('msg-sucesso');
    el.textContent = msg; el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 4000);
}
function esconderMensagens() {
    document.getElementById('msg-erro').style.display = 'none';
    document.getElementById('msg-sucesso').style.display = 'none';
    document.getElementById('form-erro').style.display = 'none';
}

carregarCartoes();
</script>
</body>
</html>
