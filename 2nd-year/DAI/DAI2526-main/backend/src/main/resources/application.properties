spring.application.name=loginapi

# ── Database ──────────────────────────────────────────────────────────────────
# Values come from env vars (Docker .env file).
# Default fallback = original Azure DB so local dev without Docker still works.
spring.datasource.url=${DB_URL:jdbc:postgresql://pgu-db-server.postgres.database.azure.com:5432/postgres}
spring.datasource.username=${DB_USERNAME:pgu_admin}
spring.datasource.password=${DB_PASSWORD:DbProject!2026}
spring.datasource.driver-class-name=org.postgresql.Driver

# Force UTF-8 on every DB connection (PostgreSQL)
spring.datasource.hikari.connection-init-sql=SET client_encoding TO 'UTF8'
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.connection.charSet=UTF-8
spring.jpa.properties.hibernate.connection.characterEncoding=UTF-8
spring.jpa.properties.hibernate.connection.useUnicode=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
# Run schema.sql / data.sql after Hibernate DDL so FK targets already exist.
spring.jpa.defer-datasource-initialization=true

# ── SQL initialisation ────────────────────────────────────────────────────────
spring.sql.init.mode=never
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.encoding=UTF-8

# ── Server ────────────────────────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}

# Force UTF-8 for all HTTP requests and responses
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.enabled=true

# ── Multipart uploads ─────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ── CORS ──────────────────────────────────────────────────────────────────────
# Origins separated by comma. Override with env var CORS_ALLOWED_ORIGINS on Azure.
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:5500,http://127.0.0.1:5500,ttps://pgu-projetodai-gqaefedrdje5ggfw.francecentral-01.azurewebsites.net}

# ── Jackson ───────────────────────────────────────────────────────────────────
spring.jackson.default-property-inclusion=non_null

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN
logging.level.com.example.loginapi=INFO

# ── Email ────────────────────────────────────────────────────────────────────
# Activar envio real de email (false = simula com log)
tub.email.enabled=${EMAIL_ENABLED:false}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@tub.pt}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.default-encoding=UTF-8

# ── Pagamento ────────────────────────────────────────────────────────────────
# Simular falha de pagamento em ambiente de teste (true = gera falha aleatória 20%)
tub.pagamento.falha-simulada=${PAGAMENTO_FALHA_SIMULADA:false}

# ── Passes (dias de aviso antes de expirar) ──────────────────────────────────
tub.passe.aviso-expiracao-dias=${PASSE_AVISO_EXPIRACAO_DIAS:7}

# ── Simulação de autocarros ──────────────────────────────────────────────────
app.simulator.api-key=${SIMULATOR_API_KEY:dev-simulator-key}

# Permitir referências circulares (necessário para SaldoCompraService <-> CompraPasseService)
spring.main.allow-circular-references=true

# ── Fotografia de passe ──────────────────────────────────────────────────────
tub.fotos-passe.storage-dir=./uploads/fotos-passe
tub.fotos-passe.max-size-bytes=5242880
