<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#f4f4f4;
            margin:0;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 0 12px rgba(0,0,0,0.15);
            text-align:center;
            width:400px;
        }

        h1{
            margin-bottom:25px;
        }

        input, select{
            width:100%;
            padding:12px;
            margin:8px 0;
            box-sizing:border-box;
        }

        button{
            padding:10px 18px;
            margin:8px 5px;
            cursor:pointer;
        }

        #resultado{
            margin-top:15px;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Criar Conta</h1>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <input type="text" id="nomeCompleto" placeholder="Nome Completo">
    <input type="date" id="dataNascimento">

    <select id="perfil">
        <option value="ESTUDANTE">Estudante</option>
        <option value="MILITAR">Militar</option>
        <option value="NORMAL">Normal</option>
    </select>

    <button onclick="criarConta()">Registar</button>
    <button onclick="window.location.href='index.html'">Voltar ao Login</button>

    <p id="resultado"></p>
</div>

<script>
async function criarConta() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const nomeCompleto = document.getElementById("nomeCompleto").value;
    const dataNascimento = document.getElementById("dataNascimento").value;
    const perfil = document.getElementById("perfil").value;

    try {
        const response = await fetch("/api/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: email,
                password: password,
                nomeCompleto: nomeCompleto,
                dataNascimento: dataNascimento,
                perfil: perfil
            })
        });

        const texto = await response.text();
        console.log("Resposta bruta:", texto);

        let data;
        try {
            data = JSON.parse(texto);
        } catch (e) {
            document.getElementById("resultado").innerText = "Erro no servidor.";
            alert("O servidor devolveu um erro. Vê a consola do Spring Boot.");
            return;
        }

        document.getElementById("resultado").innerText = data.message || "Sem mensagem.";

        if (data.success) {
            alert("Conta criada com sucesso!");
            window.location.href = "index.html";
        } else {
            alert(data.message || "Erro ao criar conta.");
        }

    } catch (error) {
        console.error(error);
        document.getElementById("resultado").innerText = "Erro ao comunicar com o servidor.";
        alert("Erro ao comunicar com o servidor.");
    }
}
</script>

</body>
</html>
